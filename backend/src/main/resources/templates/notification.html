<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control Effectiveness Notification</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px;
                     box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background-color: #1B4F8A; color: white; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .body { padding: 24px; }
        .body h2 { color: #1B4F8A; font-size: 18px; margin-top: 0; }
        .detail-box { background: #f0f4f8; border-left: 4px solid #1B4F8A; padding: 16px;
                      margin: 16px 0; border-radius: 4px; }
        .footer { background: #f4f6f8; padding: 16px; text-align: center; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Control Effectiveness Rater</h1>
        </div>
        <div class="body">
            <h2 th:text="'Notification: ' + ${action}">Notification</h2>
            <p>Hello,</p>
            <p>This is a notification regarding the following control:</p>
            <div class="detail-box">
                <strong>Control:</strong> <span th:text="${controlName}">Control Name</span><br/>
                <strong>Date:</strong> <span th:text="${date}">2026-04-22</span><br/>
                <strong>Details:</strong> <span th:text="${details}">Details here</span>
            </div>
            <p>Please log in to the Control Effectiveness Rater to take action.</p>
        </div>
        <div class="footer">
            <p>Tool-124 — Control Effectiveness Rater | Capstone Project</p>
        </div>
    </div>
</body>
</html>
